services:

  frontend:
    build: ./frontend
    container_name: pristine_frontend

    ports:
      - "80:80"

    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: pristine_backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: pristine_postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: